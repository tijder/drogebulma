{{ define "main" }}
<section class="section">
    <div class="container">
      {{ partial "page-head.html" (dict "title" .Title "subtitle" .Content "page" .) }}
      <div class="buttons is-centered">
      {{ range .Pages }}
        <a class="button is-primary is-light" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
      {{ end }}
      </div>
    </div>
  </section>
{{ end }}
