# Vaardigheden voor de CV-pagina, gecategoriseerd. Categorienamen zijn taalmaps
# (nl/en/fr) die de theme via trophy/loc.html lokaliseert; skillnamen zijn taalneutraal.
# `level` is een van: beginner | intermediate | advanced | expert (label + kleur via i18n).

[[categories]]
  [categories.title]
    nl = "Programmeertalen"
    en = "Programming languages"
    fr = "Langages de programmation"
  [[categories.skills]]
    name  = "Java"
    level = "expert"
  [[categories.skills]]
    name  = "JavaScript"
    level = "advanced"
  [[categories.skills]]
    name  = "Python"
    level = "intermediate"
  [[categories.skills]]
    name  = "Go"
    level = "beginner"

